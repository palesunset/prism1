name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/lsp/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -r requirements.txt
      - name: Test
        env:
          PYTHONPATH: "."
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/lsp/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: modules/lsp/frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  inventory:
    runs-on: ubuntu-latest
    env:
      SKIP_OZ_MODEL_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            modules/inventory/backend/package-lock.json
            modules/inventory/frontend/package-lock.json
      - name: Install backend
        working-directory: modules/inventory/backend
        run: npm ci
      - name: Test backend
        working-directory: modules/inventory/backend
        run: node scripts/test-all.js
      - name: Install frontend
        working-directory: modules/inventory/frontend
        run: npm ci
      - name: Build frontend
        working-directory: modules/inventory/frontend
        run: npm run build
      - name: Test frontend
        working-directory: modules/inventory/frontend
        run: npm test

  platform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  notes:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/notes/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: modules/notes/backend/package-lock.json
      - name: Install
        run: npm ci
      - name: Start API
        run: node src/index.js &
      - name: Wait for API
        run: sleep 2
      - name: Test
        run: node scripts/test-notes-api.js

  ipam:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/ipam/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: modules/ipam/backend/package-lock.json
      - name: Install
        run: npm ci
      - name: Start API
        run: node src/index.js &
      - name: Wait for API
        run: sleep 2
      - name: Test
        run: npm test
